<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Redirecting...</title>
    <script>
      var repo = "/app-eterarq";
      var l = window.location;
      l.replace(
        l.protocol +
          "//" +
          l.hostname +
          (l.port ? ":" + l.port : "") +
          repo +
          "/?p=" +
          encodeURIComponent(
            l.pathname.slice(repo.length) + l.search
          ) +
          "&h=" +
          encodeURIComponent(l.hash)
      );
    </script>
  </head>
  <body></body>
</html>
